<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Nawneet — agent harnesses, eval loops, systems that ship">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .display { font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', ui-monospace, 'Courier New', monospace; }
    </style>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1A2230" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="vignette" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0A0E14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0A0E14" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="#0A0E14"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <rect width="1200" height="360" fill="url(#vignette)"/>

  <g stroke="#FF5C00" stroke-width="2" fill="none">
    <path d="M 20 20 L 52 20 M 20 20 L 20 52"/>
    <path d="M 1180 20 L 1148 20 M 1180 20 L 1180 52"/>
    <path d="M 20 340 L 52 340 M 20 340 L 20 308"/>
    <path d="M 1180 340 L 1148 340 M 1180 340 L 1180 308"/>
  </g>

  <circle cx="92" cy="84" r="5" fill="#FF5C00">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="108" y="89" class="mono" font-size="11" letter-spacing="2" fill="#F5F1E8">ACTIVE</text>
  <text x="1108" y="89" class="mono" font-size="11" letter-spacing="1" text-anchor="end" fill="#6B7280">SYS &#x00B7; OPERATIONAL</text>

  <line x1="60" y1="105" x2="60" y2="280" stroke="#FF5C00" stroke-width="2"/>

  <text x="92" y="215" class="display" font-size="128" font-weight="700" letter-spacing="-5" fill="#F5F1E8">NAWNEET</text>

  <text x="94" y="252" class="mono" font-size="13" letter-spacing="3" fill="#F5F1E8">AGENT HARNESSES &#x00B7; EVAL LOOPS &#x00B7; SYSTEMS THAT SHIP</text>

  <line x1="92" y1="275" x2="160" y2="275" stroke="#FF5C00" stroke-width="2"/>

  <g class="mono" font-size="11" letter-spacing="2">
    <text x="92" y="305" fill="#6B7280">v0.53</text>
    <text x="160" y="305" fill="#F5F1E8">14 AGENTS ONLINE</text>
    <text x="392" y="305" fill="#6B7280">AUTONOMOUS LOOP</text>
    <text x="540" y="305" fill="#FF5C00">ACTIVE</text>
  </g>

  <g class="mono" font-size="9" letter-spacing="1" fill="#374151">
    <text x="1108" y="305" text-anchor="end">REMOTE &#x00B7; EUROPE-FACING</text>
    <text x="1108" y="320" text-anchor="end">BUILDING IN PUBLIC</text>
  </g>
</svg>
